<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #5f2c82, #49a09d);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 40px 25px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        width: 120px;
        border-radius: 20px;
        margin-bottom: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 25px;
    }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 15px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
        transition: 0.3s;
        cursor: pointer;
    }

    .android {
        background: linear-gradient(135deg, #00c853, #64dd17);
        color: white;
        box-shadow: 0 5px 20px rgba(0, 200, 83, 0.4);
    }

    .android:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(0, 200, 83, 0.6);
    }

    .windows {
        background: rgba(255,255,255,0.2);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
    }

    .windows:hover {
        transform: scale(1.05);
        background: rgba(255,255,255,0.3);
    }

    .coming {
        margin-top: 15px;
        font-size: 13px;
        opacity: 0.7;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>

<div class="card">

    <!-- Logo -->
    <img src="https://file.garden/abrK4_rpWxJegn7w/InShot_20260421_141015501.jpg" class="logo">

</script>
