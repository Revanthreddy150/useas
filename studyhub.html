```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub | Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { 
  --primary: #6c5ce7; --bg: #f4f7f6; 
  --card-bg: #ffffff; --text-main: #2d3436; 
  --border: rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins'; }

body { background: var(--bg); }

.header { text-align:center; padding:30px; }
.logo { font-family:'Orbitron'; font-size:2rem; color:var(--primary); }

.search-container { max-width:500px; margin:auto; padding:10px; }
.search-bar { width:100%; padding:12px; border-radius:30px; border:1px solid var(--border); }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  cursor:pointer;
  border:1px solid var(--border);
}

.card:hover {
  transform:translateY(-5px);
  border-color:var(--primary);
}

/* Viewer */
#viewer {
  display:none;
  position:fixed;
  inset:0;
  background:white;
  flex-direction:column;
}

.v-header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#eee;
}

iframe {
  flex:1;
  width:100%;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <h1 class="logo">STUDY HUB</h1>
</div>

<div class="search-container">
  <input type="text" id="searchInput" class="search-bar" placeholder="Search subjects...">
</div>

<div class="grid" id="mainGrid"></div>

<!-- Viewer -->
<div id="viewer">
  <div class="v-header">
    <span id="v-name"></span>
    <button onclick="closeViewer()">Close</button>
  </div>
  <iframe id="v-frame"></iframe>
</div>

<script>

// Data
const subjects = [
  {
    name: "Physics",
    link: "https://www.youtube.com/embed/1VfZlK6X7fQ"
  },
  {
    name: "Chemistry",
    link: "https://www.youtube.com/embed/FSyAehMdpyI"
  },
  {
    name: "Mathematics",
    link: "https://www.youtube.com/embed/2ePf9rue1Ao"
  },
  {
    name: "Biology",
    link: "https://www.youtube.com/embed/Gxv2h7kS2Tg"
  }
];

// Load cards
function loadSubjects() {
  const grid = document.getElementById("mainGrid");
  grid.innerHTML = "";

  subjects.forEach(sub => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<h3>${sub.name}</h3>`;

    card.onclick = () => {
      openViewer(sub.name, sub.link);
    };

    grid.appendChild(card);
  });
}

// Open viewer
function openViewer(name, link) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("v-name").innerText = name;
  document.getElementById("v-frame").src = link;
}

// Close viewer
function closeViewer() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("v-frame").src = "";
}

// Search
document.getElementById("searchInput").addEventListener("input", function () {
  const value = this.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(value) ? "block" : "none";
  });
});

// Start
loadSubjects();

</script>

</body>
</html>
```
