<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mappls Map</title>
    
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
        }
    </style>

    <!-- 1. The script points to a callback function 'initMap' after downloading -->
    <script src="https://apis.mappls.com/advancedmaps/api/ycrdfvhlcozpjpbzccaqimgzjhbsqabkhbdf/map_sdk?layer=vector&v=3.0&callback=initMap" defer async></script>
</head>
<body>

    <!-- 2. Container for the map layout -->
    <div id="map"></div>

    <script>
        var map;
        
        // 3. This function executes automatically once the script loads completely
        function initMap() {
            // Standard object casing defined by Mappls core SDK
            map = new Mappls.Map('map', {
                center: [28.6139, 77.2090], // Coordinates for New Delhi
                zoom: 12
            });

            // 4. Safely attach markers once the map canvas layers finish loading
            map.addListener('load', function () {
                var marker = new Mappls.Marker({
                    map: map,
                    position: { "lat": 28.6139, "lng": 77.2090 }
                });
            });
        }
    </script>

</body>
</html>
