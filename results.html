<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Results Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Student Result Portal</h1>
            <p class="text-slate-500">Search by Roll No or select a name below</p>
        </div>

        <div class="flex gap-2 mb-6">
            <input type="text" id="searchInput" placeholder="Enter Roll Number..." class="flex-1 p-4 rounded-lg border shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            <button id="searchBtn" class="bg-blue-600 text-white px-6 rounded-lg font-bold hover:bg-blue-700">SEARCH</button>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-sm mb-8 border border-slate-200">
            <h3 class="text-xs font-bold text-slate-400 uppercase mb-3">Student List</h3>
            <div id="directory" class="flex flex-wrap gap-2"></div>
        </div>

        <div id="resultCard" class="hidden bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
            <div class="bg-blue-600 p-6 text-white">
                <h2 id="resName" class="text-2xl font-bold uppercase"></h2>
                <p id="resDetails" class="opacity-80"></p>
            </div>
            <div class="p-6">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b text-slate-400 text-sm uppercase">
                            <th class="py-3 px-2">Subject Name</th>
                            <th class="py-3 px-2 text-center">Grade</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
        <div id="noData" class="hidden text-center py-10 text-red-500 font-bold">Record not found!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkWMaV8wevVBSKj4kin7r8-qZqqOe5hhA",
            authDomain: "ndbackend-77756.firebaseapp.com",
            databaseURL: "https://ndbackend-77756-default-rtdb.firebaseio.com",
            projectId: "ndbackend-77756",
            storageBucket: "ndbackend-77756.firebasestorage.app",
            messagingSenderId: "672027347736",
            appId: "1:672027347736:web:7b643b45959956a32fac6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Load Directory
        onValue(ref(db, 'students'), (snap) => {
            const dir = document.getElementById('directory');
            dir.innerHTML = "";
            if(snap.exists()){
                Object.entries(snap.val()).forEach(([id, data]) => {
                    const btn = document.createElement('button');
                    btn.className = "px-3 py-1 bg-slate-100 hover:bg-blue-600 hover:text-white rounded-full text-sm transition border";
                    btn.innerText = data.name;
                    btn.onclick = () => { document.getElementById('searchInput').value = id; showResult(id); };
                    dir.appendChild(btn);
                });
            }
        });

        async function showResult(id) {
            const val = id || document.getElementById('searchInput').value.trim();
            const snap = await get(ref(db, `students/${val}`));
            const card = document.getElementById('resultCard');
            const tbody = document.getElementById('resultBody');
            
            if(snap.exists()){
                const data = snap.val();
                document.getElementById('noData').classList.add('hidden');
                card.classList.remove('hidden');
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resDetails').innerText = `Roll: ${data.rollNo} | ${data.course} | Sem: ${data.semester}`;
                
                tbody.innerHTML = data.results.map(r => `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="py-4 px-2 font-medium text-slate-700">${r.sub}</td>
                        <td class="py-4 px-2 text-center font-bold text-blue-600">${r.grade}</td>
                    </tr>
                `).join('');
                card.scrollIntoView({ behavior: 'smooth' });
            } else {
                card.classList.add('hidden');
                document.getElementById('noData').classList.remove('hidden');
            }
        }

        document.getElementById('searchBtn').addEventListener('click', () => showResult());
    </script>
</body>
</html>
