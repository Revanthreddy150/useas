<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Current Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://apis.mappls.com/advancedmaps/api/ycrdfvhlcozpjpbzccaqimgzjhbsqabkhbdf/map_sdk?layer=vector&v=3.0"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            z-index: 1000;
            font-family: Arial;
        }
    </style>
</head>
<body>

<div id="loading">Getting your location...</div>
<div id="map"></div>

<script>
function initMap(lat, lng) {

    var map = new mappls.Map("map", {
        center: [lat, lng],
        zoom: 16
    });

    new mappls.Marker({
        map: map,
        position: {
            lat: lat,
            lng: lng
        },
        popupHtml: "<b>You are here</b>"
    });

    document.getElementById("loading").style.display = "none";
}

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function(position) {

        initMap(
            position.coords.latitude,
            position.coords.longitude
        );

    }, function(error) {

        document.getElementById("loading").innerHTML =
            "Location permission denied.";

    }, {
        enableHighAccuracy: true
    });

} else {

    document.getElementById("loading").innerHTML =
        "Geolocation is not supported.";

}
</script>

</body>
</html>
