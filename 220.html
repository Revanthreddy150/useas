<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1847020814272884" crossorigin="anonymous"></script>
    <script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USEAS | Student Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --primary-accent: #6366f1;
            --secondary-accent: #a855f7;
            --text-main: #0f172a;
            --max-width: 1100px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fafc; min-height: 100vh; color: var(--text-main); overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }

        /* --- Header Styles --- */
        header {
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 9999; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        @media (min-width: 1024px) { header { padding: 12px calc((100% - var(--max-width)) / 2 + 20px); } }

        .header-btn {
            background: white; color: var(--primary-accent); border: none;
            width: 42px; height: 42px; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: 0.2s;
        }

        /* --- Ad Free Status Button --- */
        #ad-status-btn { background: #fff1f2; color: #e11d48; position: relative; }
        #ad-status-btn.is-active { background: #f0fdf4; color: #22c55e; border: 2px solid #22c55e; }
        .timer-label { position: absolute; bottom: -18px; font-size: 10px; font-weight: 800; white-space: nowrap; }

        /* --- Reward Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            z-index: 10001; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: white; padding: 30px; border-radius: 28px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .reward-btn {
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 16px;
            border: none; background: var(--primary-accent); color: white;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .reward-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- Main Content --- */
        .content-area { width: 100%; flex: 1; position: relative; padding-top: 80px; }
        .iframe-container { width: 100%; height: calc(100vh - 80px); border: none; display: none; background: white; }
        .iframe-container.active { display: block; }
        .page { display: none; padding: 20px; width: 100%; max-width: var(--max-width); margin: 0 auto; }
        .page.active { display: block; }

        .lab-banner {
            width: 100%; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 28px; padding: 40px; color: white; position: relative; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="adModal">
        <div class="modal-card">
            <div style="font-size: 3rem; margin-bottom: 15px;">🛡️</div>
            <h2 id="modalTitle">Go Ad-Free?</h2>
            <p id="modalDesc" style="color: #64748b; margin: 10px 0 20px;">Support us by interacting with 3 Ads and enjoy a clean, ad-free experience for 3 hours!</p>
            
            <button class="reward-btn" onclick="startRewardTask()">
                <i class="fa-solid fa-rectangle-ad"></i> Click 3 Ads to Unlock
            </button>
            
            <button onclick="closeModal()" style="margin-top: 15px; background: none; border: none; color: #94a3b8; cursor: pointer; font-weight: 600;">Maybe Later</button>
        </div>
    </div>

    <header id="main-header">
        <div style="display: flex; gap: 15px;">
            <button class="header-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
            <button class="header-btn" id="back-btn" onclick="showPage('home')" style="display:none;"><i class="fa-solid fa-arrow-left"></i></button>
        </div>
        
        <div style="font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">USEAS</div>
        
        <div style="display: flex; gap: 12px;">
            <button class="header-btn" id="ad-status-btn" onclick="openModal()">
                <i class="fa-solid fa-shield-halved"></i>
                <span class="timer-label" id="timerDisplay">Ads ON</span>
            </button>
            <button class="header-btn" onclick="showChatbot()"><i class="fa-solid fa-robot"></i></button>
        </div>
    </header>

    <div class="content-area">
        <iframe id="labFrame" class="iframe-container" src="https://www.useas.online/abhyaslabkeys"></iframe>
        <div id="home" class="page active">
            <div class="lab-banner">
                <h2 style="font-size: 2rem; margin-bottom: 10px;">Abhyas Lab Keys</h2>
                <p style="opacity: 0.9; margin-bottom: 25px;">The fastest way to finish your labs.</p>
                <button onclick="showExternal('labFrame')" style="background: white; color: #4f46e5; border: none; padding: 12px 25px; border-radius: 14px; font-weight: 800; cursor: pointer;">Launch Lab</button>
            </div>
            
            <p style="margin-top: 30px; text-align: center; color: #94a3b8; font-size: 0.8rem;">Scroll down for more essentials...</p>
        </div>
    </div>

    <script>
        // --- AD FREE CONFIGURATION ---
        const DURATION = 3 * 60 * 60 * 1000; // 3 Hours
        const REWARD_PAGE_URL = "https://www.useas.online/notifications"; // Set this to the page where they should click ads

        function openModal() {
            const expiry = localStorage.getItem('adFreeUntil');
            if (expiry && Date.now() < expiry) {
                alert("You already have Ad-Free active!");
                return;
            }
            document.getElementById('adModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('adModal').style.display = 'none';
        }

        function startRewardTask() {
            // Step 1: Tell the system we are expecting a "claim"
            localStorage.setItem('pendingReward', 'true');
            
            // Step 2: Redirect to your Ad Page
            // On that page, you should have a button that says "Claim My 3 Hours" 
            // that only appears after they click/wait.
            window.location.href = REWARD_PAGE_URL; 
        }

        // Logic to run when they return to the site
        function checkRewardSuccess() {
            const params = new URLSearchParams(window.location.search);
            // If the user comes back with ?action=claim_success (you add this to your reward page link)
            if (params.get('action') === 'claim_success' && localStorage.getItem('pendingReward') === 'true') {
                const expiry = Date.now() + DURATION;
                localStorage.setItem('adFreeUntil', expiry);
                localStorage.removeItem('pendingReward');
                alert("Thank you for your support! Ads are now hidden for 3 hours.");
                window.location.href = window.location.pathname; // Clean URL
            }
            updateAdUI();
        }

        function updateAdUI() {
            const expiry = localStorage.getItem('adFreeUntil');
            const btn = document.getElementById('ad-status-btn');
            const timerText = document.getElementById('timerDisplay');
            const ads = document.querySelectorAll('ins.adsbygoogle, amp-auto-ads, #container-b18faffa536f7227efc89409ea4acda5');

            if (expiry && Date.now() < expiry) {
                // AD FREE IS ACTIVE
                btn.classList.add('is-active');
                let hoursLeft = Math.ceil((expiry - Date.now()) / (1000 * 60 * 60));
                timerText.innerText = hoursLeft + "h Free";
                ads.forEach(a => a.style.display = 'none');
            } else {
                // ADS ARE ON
                btn.classList.remove('is-active');
                timerText.innerText = "Ads ON";
                ads.forEach(a => a.style.display = 'block');
                localStorage.removeItem('adFreeUntil');
            }
        }

        // --- NAVIGATION LOGIC ---
        function showPage(pageId) {
            document.querySelectorAll('.page, .iframe-container').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('back-btn').style.display = (pageId === 'home') ? 'none' : 'flex';
        }

        function showExternal(fId) {
            document.querySelectorAll('.page, .iframe-container').forEach(el => el.classList.remove('active'));
            document.getElementById(fId).classList.add('active');
            document.getElementById('back-btn').style.display = 'flex';
        }

        // Initialize
        setInterval(updateAdUI, 60000); // Update timer every minute
        checkRewardSuccess();
    </script>
</body>
</html>
