<!DOCTYPE html>
<html>
<head>
    <title>USEAS | Admin Monitor</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #6366f1; color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .ip-tag { background: #e0e7ff; color: #4338ca; padding: 5px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Traffic Logs</h1>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>IP Address</th>
                    <th>Location</th>
                    <th>ISP (Provider)</th>
                    <th>Device</th>
                </tr>
            </thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* SAME CONFIG AS ABOVE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'site_visits/'), (snapshot) => {
            const list = document.getElementById('logs');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const v = child.val();
                list.innerHTML = `<tr>
                    <td>${v.time}</td>
                    <td><span class="ip-tag">${v.ip}</span></td>
                    <td>${v.location}</td>
                    <td>${v.isp}</td>
                    <td>${v.device}</td>
                </tr>` + list.innerHTML;
            });
        });
    </script>
</body>
</html>
