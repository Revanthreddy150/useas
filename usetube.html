<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS Premium</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #333; }
        .hidden { display: none; }
        button { background: #00d2ff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        video { width: 100%; border-radius: 10px; margin-top: 20px; border: 2px solid #00d2ff; }
        .alert { color: #ff4757; font-size: 14px; padding: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>USEAS PREMIUM</h2>
        <div id="auth-section">
            <button id="login-btn">Login with Google</button>
        </div>

        <div id="content-section" class="hidden">
            <div id="locked-ui">
                <p>Pay ₹1 for 7 Days Access</p>
                <button id="pay-upi-btn" style="background:#f1c40f; color:black;">1. Pay via UPI</button>
                <input type="text" id="utr-input" placeholder="Paste 12-digit UTR Code">
                <button id="unlock-btn">2. Unlock & Watch</button>
            </div>

            <div id="unlocked-ui" class="hidden">
                <h3 id="status-tag" style="color:#2ecc71">Access Active</h3>
                <div id="video-container"></div>
            </div>
            
            <div id="banned-ui" class="hidden">
                <h3 style="color:#ff4757">Payment Rejected ❌</h3>
                <p>Your UTR was invalid. Pay again to unlock.</p>
                <button id="retry-btn">Try Again</button>
            </div>

            <br><button onclick="logout()" style="background:#333; font-size:11px; width:auto; padding:5px 15px;">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxikO_YSe0LZFz5vWHyI7de3RHt5uvRd8",
            authDomain: "premiumforyou-cd97b.firebaseapp.com",
            projectId: "premiumforyou-cd97b",
            storageBucket: "premiumforyou-cd97b.firebasestorage.app",
            messagingSenderId: "41795546476",
            appId: "1:41795546476:web:b43d200c9afc98a8775749"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('content-section').classList.remove('hidden');
                checkUserAccess(user);
            }
        });

        document.getElementById('pay-upi-btn').onclick = () => {
            window.location.href = "upi://pay?pa=revanth@ybl&pn=Revanth&am=1&cu=INR";
        };

        document.getElementById('unlock-btn').onclick = async () => {
            const utr = document.getElementById('utr-input').value;
            if(utr.length < 10) return alert("Enter valid UTR");
            
            const user = auth.currentUser;
            const expiry = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

            await setDoc(doc(db, "users", user.uid), {
                status: "pending", // Starts as pending
                expiryDate: expiry,
                utr: utr,
                userName: user.displayName
            }, { merge: true });

            location.reload();
        };

        async function checkUserAccess(user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (!userDoc.exists()) return;

            const data = userDoc.data();
            const now = new Date().getTime();

            if (data.status === "rejected") {
                document.getElementById('locked-ui').classList.add('hidden');
                document.getElementById('banned-ui').classList.remove('hidden');
            } else if (data.expiryDate > now) {
                document.getElementById('locked-ui').classList.add('hidden');
                document.getElementById('unlocked-ui').classList.remove('hidden');
                document.getElementById('status-tag').innerText = data.status === "pending" ? "Access Active (Pending Verification)" : "Access Verified ✅";
                loadVideos();
            }
        }

        async function loadVideos() {
            const querySnapshot = await getDocs(collection(db, "videos"));
            const container = document.getElementById('video-container');
            querySnapshot.forEach((doc) => {
                container.innerHTML += `<video controls src="${doc.data().url}"></video><p>${doc.data().title}</p>`;
            });
        }

        document.getElementById('retry-btn').onclick = () => location.reload();
        window.logout = () => signOut(auth);
    </script>
</body>
</html>
