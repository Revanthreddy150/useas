<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS LITE Splash Screen</title>

    <style>
        :root {
            --useas-purple-logo: #7155d3;
            --useas-gradient-end: #b67dff;
            --useas-accent-blue: #6d66e5;
            --text-dark: #22223b;
            --text-muted: #8a8a8a;
            --bg-body: #f7f8fc;
            --icon-light-green: #3ad83a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: sans-serif;
            background-color: var(--bg-body);
        }

        #splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            background: linear-gradient(135deg, var(--useas-purple-logo) 0%, var(--useas-gradient-end) 100%);
            animation: exitSplash 0.8s ease-in forwards 4.2s;
        }

        .splash-content {
            text-align: center;
            z-index: 10;
        }

        .splash-text {
            color: #fff;
            font-weight: 700;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            opacity: 0;
            letter-spacing: 5px;
            animation: textReveal 1.2s forwards 0.3s;
        }

        .code-icons {
            position: absolute;
            width: 80%;
            height: 80%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            opacity: 0.15;
        }

        .code-icons div {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            color: #fff;
            animation: iconFloat 10s infinite;
        }

        @keyframes textReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes iconFloat {
            50% { transform: translateY(-30px); }
        }

        @keyframes exitSplash {
            to { opacity: 0; visibility: hidden; pointer-events: none; }
        }
    </style>
</head>

<body>

<div id="splash-container">
    <div class="code-icons">
        <div>{ }</div>
        <div>&lt;/&gt;</div>
        <div>{ }</div>
        <div>{ }</div>
        <div>&lt;/&gt;</div>
        <div>{ }</div>
    </div>

    <div class="splash-content">
        <h1 class="splash-text">
            USEAS<br>LITE
        </h1>
    </div>
</div>

<script>
    // Redirect after 5 seconds
    setTimeout(function() {
        window.location.href = "https://www.useas.online/useas";
    }, 5000);
</script>

</body>
</html>
