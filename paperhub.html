<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4A90E2; --bg: #F8F9FB; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #333; }

        @keyframes colorMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { 
            text-align: center; font-size: 32px; font-weight: 800; padding: 40px 10px 10px;
            background: linear-gradient(270deg, #4A90E2, #9b59b6, #e74c3c, #f1c40f);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorMove 10s ease infinite;
        }

        .search-container { display: flex; justify-content: center; padding: 10px 20px 30px; gap: 10px; }
        #mSearch {
            width: 100%; max-width: 500px; padding: 14px 20px; border-radius: 12px;
            border: 1px solid #ddd; background: #fff; font-size: 16px; outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        #papers-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px; padding: 0 20px;
        }

        #chrome-container {
            display: none; padding: 0 20px; flex-direction: column; align-items: center;
        }

        .chrome-header {
            width: 100%; max-width: 1200px; display: flex; justify-content: space-between;
            align-items: center; padding: 12px; background: #333; border-radius: 15px 15px 0 0;
            color: white;
        }

        #chrome-frame {
            width: 100%; max-width: 1200px; height: 85vh; border: 2px solid #333; 
            border-radius: 0 0 15px 15px; background: #fff;
        }

        .close-chrome {
            padding: 5px 15px; background: #ff4757; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        .paper-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            border: 1px solid #f0f0f0; transition: transform 0.2s; position: relative;
        }
        .paper-card:hover { transform: translateY(-5px); }
        
        .card-preview { width: 100%; height: 300px; background: #f0f0f0; cursor: pointer; }
        .card-preview iframe, .card-preview img { width: 100%; height: 100%; border: none; object-fit: cover; pointer-events: none; }
        
        .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-weight: 600; font-size: 15px; color: #444; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .share-btn { 
            background: #f1f2f6; border: none; padding: 8px 12px; border-radius: 8px; 
            cursor: pointer; color: var(--primary); transition: 0.3s;
        }
        .share-btn:hover { background: var(--primary); color: white; }

        footer { padding: 60px; text-align: center; opacity: 0.3; font-size: 0.8rem; }

        /* Toast notification for copy */
        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 12px; position: fixed;
            z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
