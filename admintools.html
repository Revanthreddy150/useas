<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS | Admin Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #00f2fe;
            --accent: #4facfe;
            --text: #e0e0e0;
            --danger: #ff4b5c;
            --success: #00e676;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1a1f2c, var(--bg));
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #admin-header {
            font-size: 3rem;
            font-weight: 700;
            margin-top: 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }

        .auth-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
            max-width: 400px; width: 90%;
        }

        #admin-panel, #projectList { display: none; }

        input, textarea {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 14px; margin-top: 10px;
            border-radius: 12px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .google-btn { background: #fff; color: #000; }
        .verify-btn { background: var(--primary); color: #000; }
        #submitBtn { background: linear-gradient(45deg, var(--accent), var(--primary)); color: #000; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; width: 100%; max-width: 1100px; margin-top: 30px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px; text-align: center;
        }

        .admin-actions { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .edit-btn { background: var(--success); color: #000; padding: 5px 10px; width: auto; font-size: 11px;}
        .del-btn { background: var(--danger); color: #fff; padding: 5px 10px; width: auto; font-size: 11px;}
        
        .history-tag { font-size: 10px; color: var(--accent); display: block; margin-top: 5px; opacity: 0.7;}
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card" id="step1">
            <h2>Admin Login</h2>
            <button class="google-btn" id="googleLogin">Login with Google</button>
        </div>
        <div class="auth-card" id="step2" style="display: none;">
            <h2>Verify Identity</h2>
            <input type="text" id="adCode" placeholder="Enter AdCode (Phone)">
            <input type="password" id="adPass" placeholder="Enter Admin Password">
            <button class="verify-btn" id="verifyBtn">Verify Access</button>
        </div>
    </div>

    <h1 id="admin-header">USEAS</h1>
    
    <div id="admin-panel" style="width: 100%; max-width: 600px;">
        <h2 id="panel-title">Add/Commit Tool</h2>
        <input type="hidden" id="editKey">
        <input type="text" id="webName" placeholder="Application Name">
        <input type="text" id="commitNote" placeholder="What did you change? (Commit Message)">
        <textarea id="htmlCode" rows="6" placeholder="Paste HTML..."></textarea>
        <button id="submitBtn">Deploy & Save Commit</button>
    </div>

    <div class="grid" id="projectList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const encodedConfig = "QUl6YVN5RHQ4U1JPd0ZPUlRaRnFWZTV4TGMzbmxEdWtiT0FnZHpzO3VzZWFzbm90ZXMuZmlyZWJhc2VhcHAuY29tO2h0dHBzOi8vdXNlYXNub3Rlcy1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb207dXNlYXNub3Rlczt1c2Vhc25vdGVzLmZpcmViYXNlc3RvcmFnZS5hcHA7MTA2NjYwMTcxNTA5ODsxOjEwNjY2MDE3MTUwOTg6d2ViOjg4MDU0OGUzMzMyOTcwNzlkMDk2MjM=";
        const c = atob(encodedConfig).split(';');

        const firebaseConfig = {
            apiKey: c[0], authDomain: c[1], databaseURL: c[2],
            projectId: c[3], storageBucket: c[4], messagingSenderId: c[5], appId: c[6]
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentAdmin = null;

        document.getElementById('googleLogin').onclick = () => {
            signInWithPopup(auth, provider).catch(err => alert(err.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                currentAdmin = user;
            }
        });

        document.getElementById('verifyBtn').onclick = async () => {
            const adCode = document.getElementById('adCode').value;
            const adPass = document.getElementById('adPass').value;
            const adminRef = ref(db, 'authorizedAdmins/' + adCode);
            const snapshot = await get(adminRef);

            if (snapshot.exists() && snapshot.val().password === adPass && snapshot.val().email === currentAdmin.email) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('projectList').style.display = 'grid';
                renderData();
            } else {
                alert("Access Denied!");
            }
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.onclick = async () => {
            const name = document.getElementById('webName').value;
            const code = document.getElementById('htmlCode').value;
            const note = document.getElementById('commitNote').value || "Manual Update";
            const key = document.getElementById('editKey').value;
            const time = new Date().toLocaleString();

            if (!name || !code) return alert("Missing data");

            if (key) {
                // 1. Update the Main Tool
                await update(ref(db, `adminTools/${key}`), { name, code, lastUpdate: time });

                // 2. BACKEND COMMITS: Create a separate "folder" for this version
                const commitRef = ref(db, `toolCommits/${key}`);
                await push(commitRef, {
                    versionName: name,
                    versionCode: code,
                    commitMessage: note,
                    timestamp: time
                });
                
                alert("Commit Successful! Version saved in toolCommits.");
                resetForm();
            } else {
                // New Tool Deployment
                const newToolRef = push(ref(db, 'adminTools'));
                const newKey = newToolRef.key;
                
                await set(newToolRef, { name, code, lastUpdate: time });
                
                // Initial Commit
                await push(ref(db, `toolCommits/${newKey}`), {
                    versionName: name,
                    versionCode: code,
                    commitMessage: "Initial Deployment",
                    timestamp: time
                });
                
                resetForm();
            }
        };

        function renderData() {
            onValue(ref(db, 'adminTools'), (snapshot) => {
                const projectList = document.getElementById('projectList');
                projectList.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <strong>${item.name}</strong>
                            <span class="history-tag">Updated: ${item.lastUpdate || 'Just now'}</span>
                            <div class="admin-actions">
                                <button class="edit-btn" onclick="triggerEdit('${key}')">Edit & Commit</button>
                                <button class="del-btn" onclick="triggerDelete('${key}')">Delete</button>
                            </div>
                        `;
                        card.onclick = (e) => {
                            if (e.target.tagName !== 'BUTTON') {
                                const win = window.open("", "_blank");
                                win.document.write(item.code);
                                win.document.close();
                            }
                        };
                        projectList.appendChild(card);
                    });
                }
            });
        }

        window.triggerDelete = (key) => {
            if (confirm("Delete this tool and all its commit history?")) {
                remove(ref(db, `adminTools/${key}`));
                remove(ref(db, `toolCommits/${key}`));
            }
        };

        window.triggerEdit = (key) => {
            get(ref(db, `adminTools/${key}`)).then((snap) => {
                const item = snap.val();
                document.getElementById('webName').value = item.name;
                document.getElementById('htmlCode').value = item.code;
                document.getElementById('editKey').value = key;
                document.getElementById('commitNote').value = "";
                submitBtn.innerText = "Push New Commit";
                window.scrollTo({top: 0, behavior: 'smooth'});
            });
        };

        function resetForm() {
            document.getElementById('webName').value = "";
            document.getElementById('htmlCode').value = "";
            document.getElementById('editKey').value = "";
            document.getElementById('commitNote').value = "";
            submitBtn.innerText = "Deploy & Save Commit";
        }
    </script>
</body>
</html>
