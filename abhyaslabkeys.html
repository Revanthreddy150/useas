<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYALABKEYS | HD Repository</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --secondary: #10b981; --text: #1f2937; --bg: #ffffff; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; overflow-x: hidden; }
        .container { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-size: 2.8rem; margin: 0; line-height: 1.1; color: var(--primary); }
        .feature-box { background: #f9fafb; padding: 25px; border-radius: 20px; margin: 25px 0; border: 1px solid #f3f4f6; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card:active { transform: scale(0.96); background: #f9fafb; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top: 2px solid var(--secondary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .card.loading .spinner { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 16px 32px; border-radius: 50px; z-index: 5000; font-weight: 600; text-align: center; }
        
        #qa-modal, #share-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .modal-wrapper { max-width: 600px; margin: 40px auto; padding: 12px; border-radius: 35px; transition: 0.3s; }
        .modal-content { background: white; border-radius: 25px; padding: 30px; position: relative; }
        .frame-red { background: #ef4444; } .frame-blue { background: #3b82f6; } .frame-yellow { background: #f59e0b; } .frame-green { background: #10b981; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #9ca3af; }
        
        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 15px 0; }
        .qa-question { font-weight: 700; color: var(--primary); cursor: pointer; flex: 1; }
        .qa-ans-box { display: none; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .qa-code { font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 13px; color: #374151; background: #f1f5f9; padding: 15px; border-radius: 12px; overflow-x: auto; margin-top: 10px; border: 1px solid #cbd5e1; position: relative; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .pdf-actions { display: flex; gap: 12px; margin-bottom: 25px; background: #f8fafc; padding: 12px; border-radius: 20px; border: 1px solid #edf2f7; }
        
        .pdf-btn-base { border: none; padding: 12px; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 700; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; }
        .preview-trigger { background: #1f2937; color: white; }
        .eye-icon { display: inline-block; animation: eyeBlink 4s infinite; }
        @keyframes eyeBlink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        .download-trigger { background: linear-gradient(135deg, #e11d48 0%, #be123c 100%); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.25); }
        .dl-icon { display: inline-block; animation: dlBounce 1.8s infinite; }
        @keyframes dlBounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(4px); } }

        .copy-btn { background: #10b981; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; flex: 2; font-weight: 700; transition: 0.3s; position: relative; }
        .share-btn { background: #6366f1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; flex: 1; font-weight: 700; transition: 0.3s; }

        .flyer-snippet { position: fixed; z-index: 9999; background: #f1f5f9; border: 1px solid var(--secondary); color: #374151; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 10px; pointer-events: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: all 0.7s cubic-bezier(0.5, 0, 0.1, 1); overflow: hidden; white-space: pre; }
        .btn-active-state { background: #059669 !important; transform: scale(1.05); }

        #share-view { background: #f3f4f6; z-index: 4000; overflow-y: auto;}
        .share-container { max-width: 650px; margin: 40px auto; background: white; padding: 35px; border-radius: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 2.2rem; } .share-container { margin: 10px; padding: 20px; } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="app-shell">
    <div class="container">
        <div class="hero">
            <h1>Abhyas<br><span>Lab Keys</span></h1>
            <p style="color:#6b7280; font-weight: 500;">Cloud-Synced HD Repository.</p>
        </div>
        <div class="feature-box">
            <ul style="list-style:none; padding:0; margin: 0; font-weight: 600;">
                <li>✦ Resource Efficiency</li>
                <li style="margin: 10px 0;">✦ Easy to access programs</li>
                <li>✦ Real-Time Updates</li>
            </ul>
        </div>
        <div id="loading-text" style="text-align:center; color:gray; padding: 20px;">Fetching Repository...</div>
        <div class="grid" id="main-grid"></div>
    </div>
</div>

<div id="qa-modal">
    <div class="modal-wrapper" id="modal-wrapper">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQA()">&times;</span>
            <h2 id="modal-title" style="margin:0 0 5px 0; color: var(--primary);">Questions</h2>
            <div class="pdf-actions">
                <button class="pdf-btn-base preview-trigger" onclick="window.generatePDF('preview')"><span class="eye-icon">👁️</span> PREVIEW PDF</button>
                <button class="pdf-btn-base download-trigger" onclick="window.generatePDF('download')"><span class="dl-icon">📥</span> DOWNLOAD PDF</button>
            </div>
            <div id="qa-container"></div>
        </div>
    </div>
</div>

<div id="share-view">
    <div class="share-container">
        <h1 style="color:var(--primary); margin:0; font-size: 2rem;">USEAS LAB</h1>
        <div style="height: 2px; background: #f3f4f6; margin: 20px 0;"></div>
        <h3 id="shared-q" style="color:#1f2937; line-height: 1.4; margin-bottom: 15px;"></h3>
        <div class="qa-code" id="shared-a"></div>
        <div class="btn-group">
            <button class="copy-btn" id="shared-copy-btn" onclick="copySharedCode()">COPY CODE</button>
            <button class="share-btn" style="background:#64748b;" onclick="window.location.href=window.location.origin + window.location.pathname">BACK TO HOME</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, onValue } from "./firebase-config.js";

    let currentData = {};
    let activeKey = null;

    // --- PDF LOGIC ---
    window.generatePDF = (mode) => {
        if (!activeKey || !currentData[activeKey]) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const item = currentData[activeKey];
        const date = new Date().toLocaleDateString();
        const addWatermark = (p) => { p.saveGraphicsState(); p.setGState(new p.GState({opacity:0.1})); p.setFontSize(60); p.setFont("helvetica","bold"); p.setTextColor(150); p.text("USEAS LAB", 45, 180, {angle:45}); p.restoreGraphicsState(); };
        addWatermark(doc);
        doc.setFontSize(22); doc.setTextColor(59,130,246); doc.text(item.name, 20, 20);
        doc.setFontSize(10); doc.setTextColor(100); doc.text(`Generated on: ${date}`, 20, 28);
        let y = 45;
        (item.questions || []).forEach((p, i) => {
            if (y > 270) { doc.addPage(); addWatermark(doc); y = 20; }
            doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(31);
            const qL = doc.splitTextToSize(`${i+1}. ${p.q}`, 170); doc.text(qL, 20, y); y += (qL.length * 7) + 2;
            const aL = doc.splitTextToSize(p.a, 165);
            if (y + (aL.length*5) > 270) { doc.addPage(); addWatermark(doc); y = 20; }
            doc.setFontSize(10); doc.setFont("courier","normal"); doc.setTextColor(55);
            doc.text(aL, 22, y); y += (aL.length * 5) + 12;
        });
        if (mode === 'preview') window.open(doc.output('bloburl'), '_blank');
        else doc.save(`${item.name}.pdf`);
    };

    // --- ANIMATIONS ---
    function performFlyAnimation(sId, bId) {
        const s = document.getElementById(sId), b = document.getElementById(bId);
        if(!s || !b) return;
        const sR = s.getBoundingClientRect(), bR = b.getBoundingClientRect();
        const f = document.createElement('div'); f.className = 'flyer-snippet';
        f.textContent = s.textContent; f.style.top = sR.top+'px'; f.style.left = sR.left+'px';
        f.style.width = sR.width+'px'; f.style.height = '100px'; document.body.appendChild(f);
        b.classList.add('btn-active-state');
        setTimeout(() => { f.style.top = (bR.top + bR.height/2)+'px'; f.style.left = (bR.left + bR.width/2)+'px'; f.style.width = '20px'; f.style.height = '10px'; f.style.opacity = '0'; }, 50);
        setTimeout(() => { f.remove(); b.classList.remove('btn-active-state'); }, 750);
    }

    function showMsg(t) { const el = document.getElementById('toast'); el.innerText = t; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 2000); }

    // --- SHARE LOGIC FIXED ---
    window.shareCode = (idx) => {
        const q = document.getElementById(`q-text-${idx}`).textContent;
        const a = document.getElementById(`text-${idx}`).textContent;
        // Using encodeURIComponent + btoa for safe character encoding
        const payload = btoa(encodeURIComponent(JSON.stringify({ q, a })));
        const shareUrl = `${window.location.origin}${window.location.pathname}?data=${payload}`;
        
        performFlyAnimation(`text-${idx}`, `share-btn-${idx}`);
        navigator.clipboard.writeText(shareUrl).then(() => showMsg("Share Link Copied!"));
    };

    function checkShareLink() {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('data');
        if (data) {
            try {
                // Decode payload safely
                const decodedData = JSON.parse(decodeURIComponent(atob(data)));
                document.getElementById('app-shell').style.display = 'none';
                document.getElementById('share-view').style.display = 'block';
                document.getElementById('shared-q').innerText = decodedData.q;
                document.getElementById('shared-a').innerText = decodedData.a;
            } catch (e) { 
                console.error("Link decode failed", e); 
                showMsg("Invalid Share Link");
            }
        }
    }

    // --- FIREBASE & RENDER ---
    const dbRef = ref(db, 'lab_keys');
    onValue(dbRef, (snap) => {
        currentData = snap.val() || {};
        document.getElementById('loading-text').style.display = 'none';
        render();
    });

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        Object.keys(currentData).forEach(key => {
            const item = currentData[key];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="display:flex;justify-content:space-between;"><strong>${item.name}</strong><div class="spinner"></div></div>
                              <p style="font-size:11px;color:${item.type==='qa'?'#10b981':'#9ca3af'};font-weight:800;margin-top:5px;">${item.type==='qa'?'VIEW REPOSITORY':'OPEN PDF'}</p>`;
            card.onclick = () => { if(item.type==='qa') openQA(key); else window.open(item.link, '_blank'); };
            grid.appendChild(card);
        });
    }

    function openQA(key) {
        activeKey = key; const item = currentData[key];
        const container = document.getElementById('qa-container');
        document.getElementById('modal-title').innerText = item.name;
        document.getElementById('modal-wrapper').className = 'modal-wrapper frame-' + (item.color || 'blue');
        container.innerHTML = '';
        (item.questions || []).forEach((p, i) => {
            const div = document.createElement('div'); div.className = 'qa-item';
            div.innerHTML = `<div class="qa-question" id="q-text-${i}" onclick="toggleAns(${i})"></div>
                             <div class="qa-ans-box" id="ans-${i}">
                                <div class="qa-code" id="text-${i}"></div>
                                <div class="btn-group">
                                    <button class="copy-btn" id="copy-btn-${i}" onclick="window.copyMainCode(${i})">COPY CODE</button>
                                    <button class="share-btn" id="share-btn-${i}" onclick="window.shareCode(${i})">SHARE</button>
                                </div>
                             </div>`;
            div.querySelector(`#q-text-${i}`).textContent = p.q;
            div.querySelector(`#text-${i}`).textContent = p.a;
            container.appendChild(div);
        });
        document.getElementById('qa-modal').style.display = 'block';
    }

    window.toggleAns = (idx) => { const box = document.getElementById(`ans-${idx}`); box.style.display = (box.style.display==='block'?'none':'block'); };
    window.copyMainCode = (idx) => { performFlyAnimation(`text-${idx}`, `copy-btn-${idx}`); navigator.clipboard.writeText(document.getElementById(`text-${idx}`).textContent).then(()=>showMsg("Code Copied!")); };
    window.copySharedCode = () => { performFlyAnimation('shared-a', 'shared-copy-btn'); navigator.clipboard.writeText(document.getElementById('shared-a').textContent).then(()=>showMsg("Code Copied!")); };
    window.closeQA = () => { document.getElementById('qa-modal').style.display = 'none'; activeKey = null; };

    checkShareLink();
</script>
</body>
</html>
