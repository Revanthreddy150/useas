<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYALABKEYS | HD Repository</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --primary: #3b82f6; 
            --dark-blue: #2563eb;
            --secondary: #10b981; 
            --text: #1f2937; 
            --bg: #ffffff; 
            --danger: #ef4444; 
            --purple: #8b5cf6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #ffffff; 
            color: var(--text); 
            padding-bottom: 60px; 
            min-height: 100vh;
        }

        body.modal-open {
            overflow: hidden;
        }
        
        .container { padding: 50px 30px; max-width: 900px; margin: 0 auto; }
        
        .hero { margin-bottom: 35px; text-align: left; padding-left: 5px; }
        .hero h1 { 
            font-size: 3rem; 
            color: var(--dark-blue); 
            font-weight: 700; 
            line-height: 1.15; 
            letter-spacing: -0.5px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 20px 0; }
        
        .card { 
            background: white; 
            padding: 28px 24px; 
            border-radius: 20px; 
            border: 1px solid #e5e7eb; 
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; 
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 115px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03);
        }
        .card:active { transform: scale(0.97); }
        
        .card .title-label {
            font-size: 1.25rem; 
            font-weight: 700; 
            color: #111827;
            margin-bottom: 6px;
            padding-right: 75px;
        }
        
        .card .action-label { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--secondary); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            display: block; 
        }
        .card .pdf-label {
            font-size: 11px; 
            font-weight: 800; 
            color: #9ca3af; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            display: block; 
        }
        
        .count-badge { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #dbeafe; 
            color: var(--dark-blue); 
            font-size: 10px; 
            padding: 3px 10px; 
            border-radius: 12px; 
            font-weight: 800; 
        }
        
        #toast { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0, 0, 0, 0.85); 
            color: white; 
            padding: 14px 28px; 
            border-radius: 50px; 
            z-index: 5000; 
            font-weight: 600; 
            font-size: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        #qa-modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            z-index: 2000; 
            overflow-y: scroll; 
            padding: 20px; 
        }
        
        .modal-wrapper { 
            max-width: 620px; 
            margin: 30px auto; 
            padding: 12px; 
            border-radius: 35px; 
        }
        .modal-content { 
            background: white; 
            border-radius: 25px; 
            padding: 30px; 
            position: relative; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .frame-red { background: #ef4444; } 
        .frame-blue { background: #3b82f6; } 
        .frame-yellow { background: #f59e0b; } 
        .frame-green { background: #10b981; }
        
        .close-modal { 
            position: absolute; 
            right: 25px; top: 22px; 
            font-size: 26px; 
            cursor: pointer; 
            color: #9ca3af; 
            line-height: 1; 
        }
        
        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 16px 0; width: 100%; }
        .qa-question { 
            font-weight: 700; 
            color: #2563eb; 
            cursor: pointer; 
            user-select: none; 
            line-height: 1.4; 
            font-size: 1.05rem; 
        }
        
        .qa-ans-box { 
            display: none; 
            background: #ffffff; 
            padding: 5px 0 10px 0; 
            margin-top: 10px; 
        }
        
        .qa-code-wrapper {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .qa-code { 
            font-family: 'Courier New', monospace; 
            white-space: pre-wrap; 
            font-size: 13.5px; 
            color: #334155; 
            margin: 0; 
            overflow-x: auto; 
            line-height: 1.5; 
        }
        
        .explanation-box {
            display: none;
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        .explain-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px dashed #ddd6fe;
            padding-bottom: 8px;
        }
        .explanation-box h4 {
            color: #6d28d9;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lang-select {
            background: white;
            border: 1px solid #c084fc;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #6d28d9;
            cursor: pointer;
            outline: none;
        }
        
        .ai-response-text {
            font-size: 13.5px;
            color: #2e0854;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .ai-loading-skeleton {
            color: #7c3aed;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #7c3aed;
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-group { display: flex; width: 100%; gap: 10px; }
        .copy-btn { 
            background: var(--secondary); 
            color: white; 
            border: none; 
            padding: 13px; 
            border-radius: 12px; 
            cursor: pointer; 
            flex: 1;
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-size: 13px;
        }
        .copy-btn:hover { background: #059669; }
        
        .explain-btn {
            background: var(--purple);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px;
        }
        .explain-btn:hover { background: #7c3aed; }
        
        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; gap: 14px; } 
            .container { padding: 30px 15px; }
            .hero h1 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="app-shell">
    <div class="container">
        <div class="hero">
            <h1>Abhyas<br>Lab Keys</h1>
        </div>
        <div id="loading-text" style="text-align:left; padding: 5px; font-weight: 600; color: #9ca3af;">Fetching Repository...</div>
        <div class="grid" id="main-grid"></div>
    </div>
</div>

<div id="qa-modal">
    <div class="modal-wrapper" id="modal-wrapper">
        <div class="modal-content">
            <span class="close-modal" onclick="closeQA()">&times;</span>
            <h2 id="modal-title" style="margin-bottom:20px; color: #2563eb; font-size: 1.65rem; font-weight: 700;">Questions</h2>
            <div id="qa-container"></div>
        </div>
    </div>
</div>
