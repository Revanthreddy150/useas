        .hero h1 { font-size: 2.8rem; margin: 0; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .card { background: white; padding: 25px; border-radius: 18px; border: 1px solid #e5e7eb; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative;}

        .qa-item { border-bottom: 1px solid #f3f4f6; padding: 15px 0; }
        .qa-question { font-weight: 700; color: var(--primary); cursor: pointer; }
        .qa-ans-box { display: none; background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .qa-code { font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 13px; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .copy-btn { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 2; font-weight: 700; }
        .share-btn { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: 700; }
