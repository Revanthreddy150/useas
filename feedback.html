<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Hub | USEAS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDt8SROwFORTZFqVe5xLc3nlDukbOAgdzs",
            authDomain: "useasnotes.firebaseapp.com",
            databaseURL: "https://useasnotes-default-rtdb.firebaseio.com",
            projectId: "useasnotes",
            storageBucket: "useasnotes.firebasestorage.app",
            messagingSenderId: "1066601715098",
            appId: "1:1066601715098:web:880548e333297079d09623",
            measurementId: "G-48C783281Y"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRating = 0;
        let clickCount = 0;
        let isAdmin = false;

        window.checkAdmin = function() {
            clickCount++;
            if (clickCount === 5) {
                const pass = prompt("Enter Admin Password:");
                if (pass === "feedback@123") {
                    isAdmin = true;
                    document.getElementById('adminPanel').style.display = 'block';
                    document.body.classList.add('admin-mode-active');
                    alert("Admin Access Granted - Delete options enabled on Wall.");
                    renderData(); // Refresh to show delete buttons
                } else {
                    clickCount = 0;
                }
            }
        };

        window.rate = function(n) {
            currentRating = n;
            const stars = document.querySelectorAll('.rating-box i');
            stars.forEach((star, index) => {
                star.style.color = (index < n) ? "#FFD700" : "#cbd5e0";
            });
        };

        document.getElementById('feedbackForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            if(currentRating === 0) return alert("Please select a star rating!");

            push(ref(db, 'feedbacks'), {
                name, message: msg, rating: currentRating, status: 'pending', date: new Date().toLocaleDateString()
            }).then(() => {
                alert("Sent! Waiting for admin approval.");
                e.target.reset();
                rate(0);
            });
        });

        let globalData = {};
        onValue(ref(db, 'feedbacks'), (snapshot) => {
            globalData = snapshot.val();
            renderData();
        });

        function renderData() {
            const adminList = document.getElementById('adminList');
            const publicWall = document.getElementById('publicWall');
            adminList.innerHTML = ''; publicWall.innerHTML = '';

            for (let id in globalData) {
                const item = globalData[id];
                
                // PENDING LIST (Admin only)
                if (item.status === 'pending') {
                    adminList.innerHTML += `
                        <div class="admin-card">
                            <strong>${item.name}</strong> (${item.rating}★)<br>${item.message}
                            <div style="margin-top:10px">
                                <button class="btn-acc" onclick="updateStatus('${id}', 'approved')">Accept</button>
                                <button class="btn-rej" onclick="deleteFeedback('${id}')">Reject</button>
                            </div>
                        </div>`;
                }

                // APPROVED WALL
                if (item.status === 'approved') {
                    const deleteBtn = isAdmin ? `<button class="btn-rej-small" onclick="deleteFeedback('${id}')"><i class="fa-solid fa-trash"></i></button>` : '';
                    
                    publicWall.innerHTML += `
                        <div class="post shine-anim">
                            <div class="post-info">
                                <strong>${item.name}</strong>
                                <span>${item.date} ${deleteBtn}</span>
                            </div>
                            <div class="stars">${"★".repeat(item.rating)}</div>
                            <p>${item.message}</p>
                        </div>`;
                }
            }
        }

        window.updateStatus = (id, status) => update(ref(db, `feedbacks/${id}`), { status });
        window.deleteFeedback = (id) => {
            if(confirm("Are you sure you want to delete this feedback?")) {
                remove(ref(db, `feedbacks/${id}`));
            }
        };
    </script>

    <style>
        :root {
            --primary: #8b8df8;
            --bg: #f8faff;
            --text: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
        }

        .hero { text-align: center; padding: 60px 20px; background: var(--white); border-bottom: 1px solid #eef2f6; }
        .hero h1 { font-size: 3rem; color: var(--primary); margin: 0; cursor: pointer; }
        .hero p { color: #64748b; font-weight: 500; }

        .content-container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 40px;
            max-width: 1300px;
            margin: -40px auto 40px;
            padding: 0 20px;
        }

        /* Form Card */
        .form-card {
            background: var(--white); padding: 35px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); height: fit-content;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 15px; box-sizing: border-box;
        }
        .rating-box { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .rating-box i { font-size: 28px; color: #cbd5e0; cursor: pointer; }

        .btn-submit {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        /* Wall Section */
        .wall-card {
            background: var(--white); padding: 35px; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); max-height: 750px; overflow-y: auto;
        }

        /* SHINE ANIMATION EFFECT */
        .shine-anim {
            position: relative;
            overflow: hidden;
            background: #f8fafc;
            border: 1px solid #edf2f7;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .shine-anim::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            from { left: -150%; }
            to { left: 150%; }
        }

        .post-info { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; align-items: center; }
        .stars { color: #FFD700; margin: 8px 0; }
        .post p { margin: 0; line-height: 1.5; color: #334155; }

        /* Admin controls */
        #adminPanel { display: none; margin-top: 20px; border-top: 2px dashed #eee; padding-top: 20px; }
        .admin-card { background: #fff5f5; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }
        .btn-acc { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-rej { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-rej-small { background: #fee2e2; color: #ef4444; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 10px;}

        /* Scrollbar */
        .wall-card::-webkit-scrollbar { width: 6px; }
        .wall-card::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @media (max-width: 950px) {
            .content-container { grid-template-columns: 1fr; margin-top: 0; }
            .wall-card { max-height: none; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <p>USEAS COMMUNITY</p>
        <h1 onclick="checkAdmin()">Feedback</h1>
        <p>Mee prayanam maa bhadyatha - Tell us how we are doing!</p>
    </div>

    <div class="content-container">
        
        <div class="form-section">
            <div class="form-card">
                <form id="feedbackForm">
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" placeholder="Enter your name" required>
                    </div>

                    <div class="rating-box">
                        <i class="fa-solid fa-star" onclick="rate(1)"></i>
                        <i class="fa-solid fa-star" onclick="rate(2)"></i>
                        <i class="fa-solid fa-star" onclick="rate(3)"></i>
                        <i class="fa-solid fa-star" onclick="rate(4)"></i>
                        <i class="fa-solid fa-star" onclick="rate(5)"></i>
                    </div>

                    <div class="input-group">
                        <label>Review Message</label>
                        <textarea id="userMsg" rows="5" placeholder="Share your experience with USEAS..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Submit Review</button>
                </form>

                <div id="adminPanel">
                    <h4 style="color: #ef4444;"><i class="fa-solid fa-lock"></i> Pending Approvals</h4>
                    <div id="adminList"></div>
                </div>
            </div>
        </div>

        <div class="wall-section">
            <div class="wall-card">
                <h2>User Feedbacks</h2>
                <div id="publicWall">
                    </div>
            </div>
        </div>

    </div>

</body>
</html>
