<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Study Hub Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #6c5ce7; --bg: #f4f7f6; --dark: #2d3436; 
            --accent: #2ecc71; --error: #e74c3c; --blue: #3498db;
            --purple: #a29bfe; --gold: #f1c40f;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 50px; }

        /* Navigation Bar */
        #admin-bar { 
            background: var(--dark); padding: 15px; position: sticky; top: 0; 
            z-index: 2000; border-bottom: 3px solid var(--accent); 
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .admin-btn { 
            background: var(--accent); color: white; border: none; padding: 10px 18px; 
            border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
        }
        .admin-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-paste { background: var(--purple) !important; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(162, 155, 254, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(162, 155, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(162, 155, 254, 0); }
        }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        
        /* Breadcrumbs */
        .breadcrumb-nav { 
            background: white; padding: 15px 25px; border-radius: 12px; 
            margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        #bc-container { font-size: 0.9rem; font-weight: 600; color: var(--primary); }
        .bc-link { cursor: pointer; text-decoration: none; color: var(--primary); }
        .bc-link:hover { text-decoration: underline; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { 
            background: white; padding: 30px 20px; border-radius: 15px; text-align: center; 
            position: relative; border: 1px solid #ddd; cursor: pointer; transition: 0.2s;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        /* List View for Units */
        .unit-item { 
            background: white; padding: 15px 20px; margin-bottom: 10px; border-radius: 10px; 
            border-left: 5px solid var(--primary); display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .unit-item:hover { background: #fdfdff; }

        /* Editing Panel */
        #editPanel { 
            background: white; padding: 25px; border-radius: 15px; 
            border: 2px solid var(--primary); margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(108, 92, 231, 0.2); }

        /* Panels (Inbox & Backup) */
        .full-panel { 
            position: fixed; inset: 0; background: white; z-index: 3000; 
            display: none; flex-direction: column; padding: 30px; 
        }
        .msg-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--blue); position: relative;}
        
        .badge { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; position: absolute; top: 10px; left: 10px; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="admin-bar">
    <button class="admin-btn" onclick="addNewNode()"><i class="fa-solid fa-folder-plus"></i> New Folder/Subject</button>
    <button id="paste-btn" class="admin-btn btn-paste" style="display:none;" onclick="pasteSubject()"><i class="fa-solid fa-paste"></i> Paste Subject</button>
    <button class="admin-btn" style="background:var(--gold); color:black;" onclick="openBackupPanel()"><i class="fa-solid fa-cloud-arrow-up"></i> Backups</button>
    <button class="admin-btn" id="v2-btn" onclick="toggleV2()">V2: OFF</button>
    <button class="admin-btn" style="background:var(--blue);" onclick="openInbox()"><i class="fa-solid fa-envelope"></i> Reports</button>
    <button class="admin-btn" style="background:var(--error);" onclick="location.href='index.html'">View Portal</button>
</div>

<div class="container">
    <div class="breadcrumb-nav">
        <div id="bc-container">Home</div>
        <button class="admin-btn" id="back-btn" style="background:var(--dark); display:none;" onclick="goBack()">Back</button>
    </div>

    <div id="mainGrid" class="grid"></div>

    <div id="subjectView" style="display:none;">
        <div id="unitList"></div>
        <button class="admin-btn" style="width:100%; background:var(--primary); margin-top:10px;" onclick="addUnit()">+ Add New Resource</button>
        
        <div id="editPanel" style="display:none;">
            <h3 style="margin-bottom:15px; color:var(--primary);">Edit Resource</h3>
            <label>Title</label>
            <input type="text" id="editName">
            <label>PDF Link</label>
            <input type="text" id="editPdf">
            <label>YouTube Link (Optional)</label>
            <input type="text" id="editVid">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="admin-btn" style="flex:1" onclick="saveEdit()">Update</button>
                <button class="admin-btn" style="background:var(--error); flex:1" onclick="deleteUnit()">Delete</button>
            </div>
        </div>
    </div>
</div>

<div id="message-panel" class="full-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>Student Reports</h2>
        <button class="admin-btn" onclick="document.getElementById('message-panel').style.display='none'">Close</button>
    </div>
    <div id="inbox-list" style="overflow-y:auto; flex:1;"></div>
    <button class="admin-btn" style="background:var(--error); margin-top:15px;" onclick="clearMsg()">Clear All</button>
</div>

<div id="backup-panel" class="full-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>System Backups</h2>
        <button class="admin-btn" onclick="document.getElementById('backup-panel').style.display='none'">Close</button>
    </div>
    <div style="background:#eee; padding:20px; border-radius:10px; margin-bottom:20px;">
        <h4>Create New Backup</h4>
        <input type="text" id="backupName" placeholder="Backup Name (e.g. Before Deleting Subjects)">
        <input type="password" id="backupPass" placeholder="Set Password to Restore">
        <button class="admin-btn" onclick="saveBackup()">Save Current State</button>
    </div>
    <h3>Saved Versions</h3>
    <div id="backup-list" style="overflow-y:auto; flex:1; margin-top:10px;"></div>
</div>
