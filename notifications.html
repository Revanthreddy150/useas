<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS | Notifications</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary: #6a5af9;
            --secondary: #f62d8f;
            --useas-gradient: linear-gradient(135deg, #6a5af9 0%, #f62d8f 100%);
            --bg-color: #f4f7fa;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            padding: 20px; 
            color: #2d3436;
        }

        .container { max-width: 480px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 35px; padding-top: 10px; }

        #page-title { 
            font-size: 2.5rem; 
            font-weight: 900; 
            background: var(--useas-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            cursor: pointer; 
            margin: 0; 
            letter-spacing: -1.5px;
        }

        .subtitle { color: #b2bec3; font-size: 0.9rem; margin-top: 5px; font-weight: 500; }

        /* Notification Card */
        .notification-card {
            background: white; border-radius: 24px; margin-bottom: 20px;
            box-shadow: var(--card-shadow); overflow: hidden; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.02); transition: var(--transition);
        }

        .notification-card:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(106, 90, 249, 0.12); }

        .card-top { height: 150px; background: #fdfdfd; display: flex; justify-content: center; align-items: center; position: relative; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }

        .type-badge {
            position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95);
            padding: 5px 12px; border-radius: 50px; font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .msg-placeholder { padding: 20px; color: #636e72; font-weight: 500; text-align: center; }

        .card-bottom { padding: 18px 20px; display: flex; align-items: center; background: white; border-top: 1px solid #f9f9f9; }

        .brand-avatar {
            width: 42px; height: 42px; background: var(--useas-gradient); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white;
            font-weight: 800; font-size: 0.8rem; margin-right: 15px;
        }

        .info-col { flex-grow: 1; }
        .title-text { font-weight: 700; display: block; font-size: 1rem; color: #2d3436; margin-bottom: 2px; }
        .date-text { font-size: 0.8rem; color: #b2bec3; }

        /* Share Button */
        .share-btn {
            background: #f8f9fa; border: none; width: 38px; height: 38px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); color: var(--primary);
        }
        .share-btn:hover { background: var(--primary); color: white; }

        /* Full-Screen View */
        #fs-view {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #ffffff;
            z-index: 2000; flex-direction: column; animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .fs-header { padding: 15px 20px; border-bottom: 1px solid #f1f2f6; display: flex; align-items: center; justify-content: space-between; }
        .fs-brand { font-weight: 900; font-size: 1.3rem; background: var(--useas-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .close-btn { background: #f1f2f6; border: none; padding: 10px 18px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); }

        .fs-body { flex-grow: 1; overflow-y: auto; padding: 30px 20px; max-width: 550px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        /* Modals */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(45, 52, 54, 0.4); backdrop-filter: blur(6px);
            justify-content: center; align-items: center; z-index: 3000; 
        }
        .modal-box { background: white; padding: 30px; border-radius: 28px; width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #f1f2f6; border-radius: 14px; box-sizing: border-box; font-size: 1rem; outline: none; }
        
        .btn-pub { 
            width: 100%; padding: 15px; border: none; border-radius: 14px; 
            background: var(--useas-gradient); color: white; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .btn-update { background: #2d3436; }

        #pdf-render canvas { width: 100% !important; height: auto !important; border-radius: 12px; margin-bottom: 15px; }

        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f2f6; }
        .admin-item-btns { display: flex; gap: 10px; }
        .edit-tag { color: var(--primary); font-weight: 700; cursor: pointer; font-size: 12px; }
        .del-tag { color: #ff4757; font-weight: 700; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="page-title">USEAS</h1>
        <p class="subtitle">Digital Notification Hub</p>
    </header>
    <div id="msg-list"></div>
</div>

<div id="fs-view">
    <div class="fs-header">
        <div class="fs-brand">USEAS</div>
        <button class="close-btn" onclick="closeView()">Close ✕</button>
    </div>
    <div class="fs-body">
        <h2 id="view-title" style="margin: 0 0 5px 0;"></h2>
        <p id="view-date" style="color: #b2bec3; font-weight: 600; margin-bottom: 25px; font-size: 0.9rem;"></p>
        <div id="view-text" style="color: #2d3436; line-height: 1.7; font-size: 1.05rem; white-space: pre-wrap;"></div>
        <div id="pdf-render"></div>
        <img id="view-img" style="max-width: 100%; border-radius: 18px; display: none; box-shadow: var(--card-shadow);">
    </div>
</div>

<div id="login-pop" class="modal">
    <div class="modal-box">
        <h3 style="margin-top:0">Admin Key</h3>
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn-pub" onclick="checkLogin()">Access Tools</button>
    </div>
</div>

<div id="admin-panel" class="modal">
    <div class="modal-box" style="max-height: 80vh; overflow-y: auto;">
        <h3 id="admin-form-title" style="margin-top:0">Create New Post</h3>
        <input type="text" id="in-title" placeholder="Entry Title">
        <select id="in-type">
            <option value="text">Plain Text</option>
            <option value="image">Image URL</option>
            <option value="pdf">PDF URL</option>
        </select>
        <textarea id="in-data" rows="4" placeholder="Message content or Link"></textarea>
        <button id="btn-submit" class="btn-pub" onclick="handleSubmit()">Broadcast</button>
        <button id="btn-cancel-edit" style="display:none; background:none; border:none; color:red; width:100%; margin-top:5px; cursor:pointer;" onclick="resetAdminForm()">Cancel Edit</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#b2bec3; width:100%; margin-top:15px; cursor:pointer; font-weight:700;">Dismiss</button>
        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #f1f2f6;">
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDAheWdYiiEBUHgbokK7kDPjMEEk7fngYQ",
        authDomain: "abhyaslabkeys.firebaseapp.com",
        databaseURL: "https://abhyaslabkeys-default-rtdb.firebaseio.com",
        projectId: "abhyaslabkeys",
        storageBucket: "abhyaslabkeys.firebasestorage.app",
        messagingSenderId: "782150849318",
        appId: "1:782150849318:web:5eaea4cec185abdbc567e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'notifications');

    let editModeId = null;
    let currentData = {};

    let taps = 0;
    document.getElementById('page-title').onclick = () => { 
        if(++taps >= 5) { document.getElementById('login-pop').style.display='flex'; taps=0; } 
    };
    
    window.checkLogin = () => { 
        if(document.getElementById('pass-input').value === 'note@123') { 
            document.getElementById('login-pop').style.display='none'; 
            document.getElementById('admin-panel').style.display='flex'; 
        } 
    };
    
    window.closeModals = () => {
        document.querySelectorAll('.modal').forEach(m => m.style.display='none');
        resetAdminForm();
    };

    window.handleSubmit = () => {
        const title = document.getElementById('in-title').value;
        const type = document.getElementById('in-type').value;
        const data = document.getElementById('in-data').value;
        if(!title || !data) return;

        if(editModeId) {
            set(ref(db, 'notifications/' + editModeId), {
                title, type, data, date: currentData[editModeId].date 
            });
            resetAdminForm();
        } else {
            push(dbRef, { 
                title, type, data, 
                date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) 
            });
            resetAdminForm();
        }
    };

    window.editMsg = (id) => {
        const item = currentData[id];
        editModeId = id;
        document.getElementById('in-title').value = item.title;
        document.getElementById('in-type').value = item.type;
        document.getElementById('in-data').value = item.data;
        document.getElementById('admin-form-title').innerText = "Edit Post";
        const btn = document.getElementById('btn-submit');
        btn.innerText = "Update Post";
        btn.classList.add('btn-update');
        document.getElementById('btn-cancel-edit').style.display = "block";
    };

    window.resetAdminForm = () => {
        editModeId = null;
        document.getElementById('in-title').value = "";
        document.getElementById('in-data').value = "";
        document.getElementById('admin-form-title').innerText = "Create New Post";
        const btn = document.getElementById('btn-submit');
        btn.innerText = "Broadcast";
        btn.classList.remove('btn-update');
        document.getElementById('btn-cancel-edit').style.display = "none";
    };

    onValue(dbRef, (snap) => {
        const list = document.getElementById('msg-list');
        const history = document.getElementById('history-list');
        list.innerHTML = ""; history.innerHTML = "";
        const data = snap.val();
        currentData = data || {};
        if(!data) return;

        Object.entries(data).reverse().forEach(([id, val]) => {
            const card = document.createElement('div');
            card.className = 'notification-card';
            card.onclick = () => openContent(id, val);
            let prev = val.type === 'image' ? `<img src="${val.data}" class="preview-img">` : `<div class="msg-placeholder">${val.type === 'pdf' ? '📄 Document' : '"'+val.data.substring(0,40)+'..."'}</div>`;
            
            card.innerHTML = `
                <div class="card-top"><span class="type-badge">${val.type}</span>${prev}</div>
                <div class="card-bottom">
                    <div class="brand-avatar">US</div>
                    <div class="info-col">
                        <span class="title-text">${val.title}</span>
                        <span class="date-text">${val.date}</span>
                    </div>
                    <button class="share-btn" onclick="shareMsg(event, '${val.title}', '${val.date}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    </button>
                </div>`;
            list.appendChild(card);

            history.innerHTML += `
                <div class="admin-item">
                    <span style="font-weight:600; font-size:13px;">${val.title}</span>
                    <div class="admin-item-btns">
                        <span class="edit-tag" onclick="editMsg('${id}')">Edit</span>
                        <span class="del-tag" onclick="deleteMsg('${id}')">Delete</span>
                    </div>
                </div>`;
        });
    });

    // Share Logic
    window.shareMsg = (event, title, date) => {
        event.stopPropagation();
        const cleanTitle = title.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const cleanDate = date.replace(/\s/g, '-').replace(/\//g, '-');
        const shareUrl = `${window.location.origin}/useas/${cleanTitle}/${cleanDate}`;

        if (navigator.share) {
            navigator.share({
                title: `USEAS | ${title}`,
                text: `Check this out: ${title}`,
                url: shareUrl
            }).catch(err => console.log('Share failed', err));
        } else {
            const dummy = document.createElement("input");
            document.body.appendChild(dummy);
            dummy.value = shareUrl;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("Share link copied to clipboard!");
        }
    };

    window.deleteMsg = (id) => { if(confirm("Delete this?")) remove(ref(db, 'notifications/' + id)); };

    async function renderPDF(url) {
        const target = document.getElementById('pdf-render');
        target.innerHTML = "Fetching PDF...";
        try {
            const pdf = await pdfjsLib.getDocument(url).promise;
            target.innerHTML = "";
            for(let i=1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                target.appendChild(canvas);
            }
        } catch (e) { target.innerHTML = "Error loading document."; }
    }

    window.openContent = (id, item) => {
        document.getElementById('fs-view').style.display = 'flex';
        document.getElementById('view-title').innerText = item.title;
        document.getElementById('view-date').innerText = item.date;
        document.getElementById('pdf-render').innerHTML = "";
        document.getElementById('view-img').style.display = "none";
        document.getElementById('view-text').innerText = item.type === 'text' ? item.data : "";
        if(item.type === 'pdf') renderPDF(item.data);
        if(item.type === 'image') { const img = document.getElementById('view-img'); img.src = item.data; img.style.display = "block"; }
    };

    window.closeView = () => document.getElementById('fs-view').style.display = 'none';
</script>
</body>
</html>
